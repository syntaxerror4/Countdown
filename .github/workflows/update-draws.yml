name: Update Draw Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update draws
        run: |
          cat > /tmp/update-draws.js << 'EOF'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");
          const DRAW_JSON_PATH = path.join(process.env.GITHUB_WORKSPACE, "Draw.json");
          const URL = "https://www.canada.ca/content/dam/ircc/documents/json/ee_rounds_123_en.json";
          
          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { "User-Agent": "Mozilla/5.0" } }, (res) => {
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(data));
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on("error", reject);
            });
          }
          
          async function main() {
            console.log("Fetching draws from IRCC...");
            const irccData = await fetchJSON(URL);
            console.log("Response:", JSON.stringify(irccData, null, 2));
            
            const newDraw = {
              drawNumber: irccData.drawNumber,
              drawDateFull: irccData.drawDateFull,
              drawName: irccData.drawName,
              drawSize: irccData.drawSize,
              drawCRS: irccData.drawCRS,
              drawCutOff: irccData.drawCutOff
            };
            
            console.log("Mapped draw:", newDraw);
            
            let existing = [];
            try { 
              existing = JSON.parse(fs.readFileSync(DRAW_JSON_PATH, "utf8")); 
            } catch {}
            
            const isDuplicate = existing.some(d => d.drawNumber === newDraw.drawNumber);
            
            if (isDuplicate) {
              console.log("Draw already exists. No update needed.");
              return;
            }
            
            console.log("Adding new draw:", newDraw.drawNumber);
            const merged = [newDraw, ...existing].slice(0, 20);
            
            fs.writeFileSync(DRAW_JSON_PATH, JSON.stringify(merged, null, 2));
            console.log("Done. Total draws:", merged.length);
          }
          
          main().catch(e => { console.error(e); process.exit(1); });
          EOF
          node /tmp/update-draws.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Draw.json
          git diff --staged --quiet || (git commit -m "chore: auto-update draws [skip ci]" && git push)
