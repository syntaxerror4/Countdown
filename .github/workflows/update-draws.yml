- name: Fetch and update draws
        run: |
          cat > /tmp/update-draws.js << 'EOF'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");
          const DRAW_JSON_PATH = path.join(process.env.GITHUB_WORKSPACE, "Draw.json");
          const URL = "https://www.canada.ca/content/dam/ircc/documents/json/ee_rounds_123_en.json";
          
          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { "User-Agent": "Mozilla/5.0" } }, (res) => {
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try {
                    console.log("Raw response length:", data.length);
                    console.log("First 200 chars:", data.substring(0, 200));
                    const parsed = JSON.parse(data);
                    console.log("Parsed type:", typeof parsed);
                    console.log("Is array:", Array.isArray(parsed));
                    console.log("Length:", parsed.length || Object.keys(parsed).length);
                    resolve(parsed);
                  } catch (e) {
                    console.error("Parse error:", e.message);
                    reject(e);
                  }
                });
              }).on("error", reject);
            });
          }
          
          async function main() {
            console.log("Fetching draws from IRCC...");
            const irccData = await fetchJSON(URL);
            
            console.log("Full response:", JSON.stringify(irccData, null, 2).substring(0, 500));
            
            let draws = irccData;
            if (!Array.isArray(irccData)) {
              if (irccData.data && Array.isArray(irccData.data)) {
                draws = irccData.data;
              } else {
                console.error("Response is not an array and no data property found");
                process.exit(1);
              }
            }
            
            if (draws.length === 0) {
              console.error("Draws array is empty");
              process.exit(1);
            }
            
            const irccDraw = draws[0];
            console.log("Latest draw:", JSON.stringify(irccDraw, null, 2));
            
            const newDraw = {
              drawNumber: parseInt(irccDraw.drawNumber),
              drawDateFull: irccDraw.drawDateFull,
              drawName: irccDraw.drawName,
              drawSize: parseInt(irccDraw.drawSize),
              drawCRS: parseInt(irccDraw.drawCRS),
              drawCutOff: irccDraw.drawCutOff || ""
            };
            
            console.log("Mapped draw:", JSON.stringify(newDraw, null, 2));
            
            let existing = [];
            try { 
              existing = JSON.parse(fs.readFileSync(DRAW_JSON_PATH, "utf8")); 
            } catch (e) {
              console.log("Draw.json doesn't exist yet, creating new");
            }
            
            const isDuplicate = existing.some(d => d.drawNumber === newDraw.drawNumber);
            
            if (isDuplicate) {
              console.log("Draw #" + newDraw.drawNumber + " already exists");
              return;
            }
            
            console.log("Adding new draw #" + newDraw.drawNumber);
            const merged = [newDraw, ...existing].slice(0, 20);
            
            fs.writeFileSync(DRAW_JSON_PATH, JSON.stringify(merged, null, 2));
            console.log("Done. Total draws:", merged.length);
          }
          
          main().catch(e => { console.error("Fatal error:", e.message); process.exit(1); });
          EOF
          node /tmp/update-draws.js
